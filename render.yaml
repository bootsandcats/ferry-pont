services:
  - type: web
    name: ferry-pont
    runtime: node
    plan: free
    region: frankfurt
    # NOTE: we install devDependencies too — `tsx`, `vite`, `esbuild`, and
    # `tailwindcss` are devDeps and are required for `npm run build`.
    # Render sets NODE_ENV=production at runtime automatically.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
    healthCheckPath: /api/ferry/pontsteiger
