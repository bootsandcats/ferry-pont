name: Keep Render awake

# Pings the deployed Render service every 12 minutes, but ONLY between
# 08:00–20:00 Amsterdam time. Outside those hours the server is allowed
# to sleep — the app shows a cute cat while it wakes up (~30s cold start).
#
# Why the cron runs 06:00–18:59 UTC and then filters in the shell:
#   - 06:00–18:59 UTC covers the 08:00–20:59 CEST window (summer, UTC+2)
#   - It also covers the 07:00–19:59 CET window  (winter, UTC+1)
#   - The `TZ=Europe/Amsterdam` hour check below then narrows to 08:00–19:59
#     Amsterdam wall-clock, automatically handling DST.

on:
  schedule:
    - cron: "*/12 6-18 * * *"
  workflow_dispatch: # allow manual "ping now" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check Amsterdam hour
        id: hour
        run: |
          AMS_HOUR=$(TZ=Europe/Amsterdam date +%H)
          AMS_TIME=$(TZ=Europe/Amsterdam date +"%H:%M")
          echo "hour=$AMS_HOUR" >> "$GITHUB_OUTPUT"
          echo "ams_time=$AMS_TIME" >> "$GITHUB_OUTPUT"
          if [ "$AMS_HOUR" -ge 8 ] && [ "$AMS_HOUR" -lt 20 ]; then
            echo "should_ping=true" >> "$GITHUB_OUTPUT"
            echo "Within keep-alive window ($AMS_TIME Amsterdam) — will ping."
          else
            echo "should_ping=false" >> "$GITHUB_OUTPUT"
            echo "Outside keep-alive window ($AMS_TIME Amsterdam) — skipping."
          fi

      - name: Ping Render
        if: steps.hour.outputs.should_ping == 'true'
        env:
          # Set APP_URL as a repo Variable (Settings → Secrets and variables →
          # Actions → Variables) if your Render URL is NOT the default below.
          APP_URL: ${{ vars.APP_URL || 'https://ferry-pont.onrender.com' }}
        run: |
          echo "Pinging $APP_URL at ${{ steps.hour.outputs.ams_time }} Amsterdam"
          # --max-time 45 because a cold start can take up to ~30s
          curl -fsS --max-time 60 -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            "$APP_URL/api/ferry/pontsteiger"
